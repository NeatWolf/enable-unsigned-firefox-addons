name: Verify

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  scripts:
    name: Script verifier
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      - name: Check Bash syntax
        run: |
          bash -n patch-firefox.sh
          bash -n unpatch-firefox.sh
          bash -n clear-startup-cache.sh
          bash -n scripts/verify-fixture.sh

      - name: Run fixture verifier
        run: bash scripts/verify-fixture.sh

  windows:
    name: Windows verifier
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run PowerShell verifier
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify.ps1
